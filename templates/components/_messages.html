{% if messages %}
  <div class="mb-4 space-y-2" id="messages-container">
    {% for message in messages %}
      <div
        x-data="{ show: true }"
        x-show="show"
        x-init="setTimeout(() => show = false, 4500)"
        x-transition:leave="transition ease-in duration-300"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 -translate-y-2"
        class="flex items-start gap-3 rounded-lg border px-4 py-3 text-sm
          {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800
          {% elif message.tags == 'error' %}bg-red-50 border-red-200 text-red-800
          {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
          {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}"
        role="alert"
      >
        <span class="flex-1">{{ message }}</span>
        <button @click="show = false" class="ml-auto text-current opacity-60 hover:opacity-100" aria-label="Dismiss">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
