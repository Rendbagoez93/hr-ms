{% if breadcrumbs %}
  <nav class="mb-4 flex items-center gap-2 text-sm text-slate-500" aria-label="Breadcrumb">
    {% for crumb in breadcrumbs %}
      {% if not forloop.last %}
        <a href="{{ crumb.url }}" class="hover:text-indigo-600 transition-colors">{{ crumb.label }}</a>
        <span aria-hidden="true">›</span>
      {% else %}
        <span class="font-medium text-slate-800">{{ crumb.label }}</span>
      {% endif %}
    {% endfor %}
  </nav>
{% endif %}
