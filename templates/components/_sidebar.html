<aside class="w-60 bg-white border-r border-slate-200 flex-shrink-0 min-h-full" x-data="{ openGroup: '{{ active_group|default:'' }}' }">
  <nav class="p-4 space-y-1">

    <!-- Dashboard -->
    <a href="/"
       class="sidebar-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      Dashboard
    </a>

    <!-- Employees -->
    <div>
      <button @click="openGroup = openGroup === 'employees' ? '' : 'employees'"
              class="sidebar-group-btn w-full flex items-center justify-between">
        <span class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          Employees
        </span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform" :class="openGroup === 'employees' ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div x-show="openGroup === 'employees'" x-collapse class="pl-6 mt-1 space-y-1">
        <a href="{% url 'employee:employee-list' %}" class="sidebar-link sidebar-link-sub">All Employees</a>
        <a href="{% url 'employee:employee-create' %}" class="sidebar-link sidebar-link-sub">Add Employee</a>
      </div>
    </div>

    <!-- Employment -->
    <div>
      <button @click="openGroup = openGroup === 'employment' ? '' : 'employment'"
              class="sidebar-group-btn w-full flex items-center justify-between">
        <span class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          Employment
        </span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform" :class="openGroup === 'employment' ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div x-show="openGroup === 'employment'" x-collapse class="pl-6 mt-1 space-y-1">
        <a href="{% url 'employment:employment-list' %}" class="sidebar-link sidebar-link-sub">All Records</a>
        <a href="{% url 'employment:employment-create' %}" class="sidebar-link sidebar-link-sub">New Record</a>
      </div>
    </div>

    <!-- Organization -->
    <div>
      <button @click="openGroup = openGroup === 'org' ? '' : 'org'"
              class="sidebar-group-btn w-full flex items-center justify-between">
        <span class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
          Organization
        </span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform" :class="openGroup === 'org' ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div x-show="openGroup === 'org'" x-collapse class="pl-6 mt-1 space-y-1">
        <a href="{% url 'organization:department-list' %}" class="sidebar-link sidebar-link-sub">Departments</a>
        <a href="{% url 'organization:jobtitle-list' %}" class="sidebar-link sidebar-link-sub">Job Titles</a>
      </div>
    </div>

  </nav>
</aside>
