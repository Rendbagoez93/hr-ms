<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HR-MS{% endblock %} — HR Management System</title>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <!-- AlpineJS Collapse Plugin (must load before Alpine core) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3/dist/cdn.min.js"></script>
  <!-- AlpineJS -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <!-- App CSS -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>

<body class="h-full" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' x-data>

  <div class="min-h-full flex flex-col">

    {% include "components/_navbar.html" %}

    <div class="flex flex-1">
      {% include "components/_sidebar.html" %}

      <main class="flex-1 p-6 overflow-auto">

        {% include "components/_messages.html" %}

        {% block breadcrumb %}{% endblock %}

        {% block content %}{% endblock %}

      </main>
    </div>

  </div>

  <!-- App JS -->
  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
